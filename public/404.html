<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>ČNDB – Česká Numismatická Databáze</title>
    <!-- SPA deep-link redirect for GitHub Pages. Encodes the requested path into a
         query string and bounces to the app shell, which restores it (see index.html).
         pathSegmentsToKeep = 1 keeps the /site/ project-page prefix. -->
    <script type="text/javascript">
      (function (l) {
        var pathSegmentsToKeep = 1
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        )
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
